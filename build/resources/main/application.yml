spring:
  application:
    name: mending_BE

  profiles:
    active: ${PROFILE:local}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

springdoc:
  api-docs:
    path: /api-docs
    enabled: true

  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha


swagger:
  server:
    url: ${SERVER_URL}