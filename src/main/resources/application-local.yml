spring:
  datasource:
    url: ${MENDING_DB_URL}
    username: ${MENDING_DB_USERNAME}
    password: ${MENDING_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false


logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE


springdoc:
  swagger-ui:
    enabled: true